<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoYield | Autonomous Agent Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header class="header">
            <div class="logo-area">
                <span class="logo-emoji">🤖</span>
                <h1>AutoYield <span class="badge" id="status-badge">Idle</span></h1>
            </div>
            <div class="wallet-stats">
                <div class="stat-card">
                    <span class="stat-label">Address</span>
                    <span class="stat-value" id="wallet-address">Loading...</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Balance</span>
                    <span class="stat-value" id="wallet-balance">0.0000 SOL</span>
                </div>
            </div>
        </header>

        <section class="control-panel">
            <div class="panel-header">
                <h2>Control Center</h2>
            </div>
            <div class="actions">
                <button id="btn-status" class="btn btn-secondary">Check Status</button>
                <button id="btn-fund" class="btn btn-primary">Fund Wallet</button>
                <div class="divider"></div>
                <div class="run-controls">
                    <div class="input-group">
                        <label>Strategy</label>
                        <select id="strategy">
                            <option value="random">Random Transfer</option>
                            <option value="sweep">Sweep Yield</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Rounds</label>
                            <input type="number" id="rounds" value="1" min="0">
                        </div>
                        <div class="input-group">
                            <label>Interval (s)</label>
                            <input type="number" id="interval" value="10" min="5">
                        </div>
                    </div>
                    <div id="vault-group" class="input-group hidden">
                        <label>Vault Address</label>
                        <input type="text" id="vault" placeholder="Base58 Pubkey">
                    </div>
                    <button id="btn-run" class="btn btn-success">Start Agent</button>
                    <button id="btn-stop" class="btn btn-danger hidden">Stop Agent</button>
                </div>
            </div>
        </section>

        <section class="console-section">
            <div class="panel-header">
                <h2>Live Console</h2>
                <button id="btn-clear" class="btn-text">Clear Logs</button>
            </div>
            <div class="console-wrapper">
                <div id="console" class="console-output">
                    <div class="log-line system">Waiting for signals...</div>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
